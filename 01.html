        }

        main {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            .board_box {
                width: 800px;
                height: 800px;
                border: solid 5px #fff;
                border-radius: 30px;
                display: flex;
                flex-direction: column;
                gap: 10px;
                background: url("./img/background01.jpg");
                background-size: cover;

                position: relative;
                .board_title {
                    width: 100%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    margin-top: 10px;
                    & span {
                        text-align: center;
                        font-family: 'LOTTERIACHAB';
                        font-size: 70px;
                        -webkit-text-stroke-width: 2px;
                        -webkit-text-stroke-color: #ffffff;

                        background: linear-gradient(#e55856 0%, #11b946 100%);
                        background-clip: text;
                        -webkit-background-clip: text;
                        color: transparent;

                        border-radius: 30px;
                    }
                }
                .board_content {
                    display: flex;
                    flex-direction: column;
                    justify-content: center;
                    gap: 15px;
                    .board_week {
                        width: 460px;
                        height: 80px;
                        padding: 0 20px;
                        border-radius: 0 30px 30px 0;
                        font-family: 'LOTTERIACHAB';
                        font-size: 50px;
                        display: flex;
                        align-items: center;
                        background: rgba(255, 255, 255, 0.7);
                        backdrop-filter: blur(20px);

                        .schedule_month {
                            width: 40px;
                            color: #FDDBBB;
                            -webkit-text-stroke-width: 2px;
                            -webkit-text-stroke-color: #cea987;
                        }
                        .schedule_info {
                            width: 300px;
                            color: #FDDBBB;
                            -webkit-text-stroke-width: 2px;
                            -webkit-text-stroke-color: #cea987;
                            text-align: center;
                            font-family: 'Ownglyph_StudyHard-Rg';
                            font-size: 40px;
                        }
                        .schedule_time {
                            width: 120px;
                            color: #FDDBBB;
                            -webkit-text-stroke-width: 2px;
                            -webkit-text-stroke-color: #cea987;
                            text-align: center;
                            font-family: 'Ownglyph_StudyHard-Rg';
                            font-size: 40px;
                        }
                    }
                    .sun, .fri, .wed, .mon {
                        .schedule_month, .schedule_info, .schedule_time {
                            color: #e85351;
                            -webkit-text-stroke-color: #BD3634;
                        }
                    }
                    .sat, .thu, .tue {
                        .schedule_month, .schedule_info, .schedule_time {
                            color: #0f8033;
                            -webkit-text-stroke-color: #034F1B;
                        }
                    }
                }
                .collage_img_byulee {
                    position: absolute;
                    border-radius: 0 0 30px 0;
                    width: 300px;
                    bottom: 0;
                    right: 0;
                }
            }
            .control_box {
                width: 600px;
                display: flex;
                align-items: center;
                flex-direction: column;
                gap: 10px;
                .control_section {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    .month_title {
                        width: 30px;
                        font-size: 30px;
                    }
                    .input_text {
                        font-size: 16px;
                        width: 230px;
                        height: 40px;
                    }
                    .time_set {
                        font-size: 16px;
                        width: 80px;
                        height: 40px;
                    }
                    .time_hour {
                        font-size: 16px;
                        width: 80px;
                        height: 40px;
                    }
                }
                & button {
                    height: 50px;
                }
            }
        }
    </style>
</head>

<script>
    $(function(){
        $(".btn_download").click(function(e){
            html2canvas(document.getElementById("schedule")).then(function(canvas) {
                var el = document.createElement("a")
                el.href = canvas.toDataURL("image/jpeg")
                el.download = '방송스케줄.jpg' //다운로드 할 파일명 설정
                el.click()
            })
        })
    })

    function changeInputText(type, event) {
        let result
        switch (type) {
            case 1:
                result = document.querySelector(".mon_result_info");
                result.textContent = event.target.value
                break
            case 2:
                result = document.querySelector(".tue_result_info");
                result.textContent = event.target.value
                break
            case 3:
                result = document.querySelector(".wed_result_info");
                result.textContent = event.target.value
                break
            case 4:
                result = document.querySelector(".thu_result_info");
                result.textContent = event.target.value
                break
            case 5:
                result = document.querySelector(".fri_result_info");
                result.textContent = event.target.value
                break
            case 6:
                result = document.querySelector(".sat_result_info");
                result.textContent = event.target.value
                break
            case 7:
                result = document.querySelector(".sun_result_info");
                result.textContent = event.target.value
                break;
            default:
                break;
        }
    }

    function changeTimeSet(type, event) {
        switch (type) {
            case 1:
                document.querySelector(".mon_result_set").textContent = event.target.value
                if (event.target.value === "휴방") {
                    document.querySelector(".mon_result_info").textContent = "-"
                    document.getElementById("mon_content").textContent = "-"
                    document.querySelector(".mon_result_hour").textContent = ""
                    document.getElementById("mon_time").disabled = true
                } else {
                    document.getElementById("mon_time").disabled = false
                    document.getElementById("mon_time").value = "1시"

    function changeTimeHour(type, event) {
        let result
        switch (type) {
            case 1:
                result = document.querySelector(".mon_result_hour");
                result.textContent = event.target.value
                break
            case 2:
                result = document.querySelector(".tue_result_hour");
                result.textContent = event.target.value
                break
            case 3:
                result = document.querySelector(".wed_result_hour");
                result.textContent = event.target.value
                break
            case 4:
                result = document.querySelector(".thu_result_hour");
                result.textContent = event.target.value
                break
            case 5:
                result = document.querySelector(".fri_result_hour");
                result.textContent = event.target.value
                break
            case 6:
                result = document.querySelector(".sat_result_hour");
                result.textContent = event.target.value
                break
            case 7:
                result = document.querySelector(".sun_result_hour");
                result.textContent = event.target.value
                break;
            default:
                break;
        }
    }
